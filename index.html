<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<title>KL工作室人員管理後臺 - 登录</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<!--图标-->
	<link rel="stylesheet" type="text/css" href="css/font-awesome.min.css">
	
	<!--布局框架-->
	<link rel="stylesheet" type="text/css" href="css/util.css">
	
	<!--主要样式-->
	<link rel="stylesheet" type="text/css" href="css/main.css">
	
	<style>
		/* 模态框通用样式 */
		.modal {
			display: none;
			position: fixed;
			z-index: 9999;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			overflow: auto;
			background-color: rgb(0,0,0);
			background-color: rgba(0,0,0,0.5);
			justify-content: center;
			align-items: center;
			transition: opacity 0.3s ease;
		}

		.modal-content {
			background-color: #fefefe;
			margin: auto;
			padding: 40px;
			border-radius: 15px;
			width: 80%;
			max-width: 500px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.3);
			transition: all 0.3s ease;
			opacity: 1;
			transform: translate(-50%, -50%) scale(1);
			position: absolute;
			left: 50%;
			top: 50%;
		}

		.close-modal {
			color: #aaa;
			float: right;
			font-size: 28px;
			font-weight: bold;
			cursor: pointer;
			transition: color 0.3s ease;
		}

		.close-modal:hover,
		.close-modal:focus {
			color: #333;
			text-decoration: none;
		}

		/* 表单样式 */
		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			font-weight: 500;
			color: #333;
		}

		.form-group input {
			width: 100%;
			padding: 12px;
			border: 1px solid #ddd;
			border-radius: 8px;
			font-size: 16px;
			transition: border-color 0.3s ease;
		}

		.form-group input:focus {
			outline: none;
			border-color: #3498db;
		}

		.btn-primary {
			background-color: #3498db;
			color: white;
			border: none;
			padding: 12px 30px;
			border-radius: 8px;
			font-size: 16px;
			cursor: pointer;
			transition: background-color 0.3s ease;
			width: 100%;
			margin-top: 10px;
		}

		.btn-primary:hover {
			background-color: #2980b9;
		}

		.btn-secondary {
			background-color: #6c757d;
			color: white;
			border: none;
			padding: 12px 30px;
			border-radius: 8px;
			font-size: 16px;
			cursor: pointer;
			transition: background-color 0.3s ease;
			margin-right: 10px;
		}

		.btn-secondary:hover {
			background-color: #5a6268;
		}

		/* 通知样式 */
		.notice-box {
			background-color: #fff3cd;
			border: 1px solid #ffeaa7;
			color: #856404;
			padding: 15px;
			border-radius: 8px;
			margin-bottom: 20px;
		}

		.notice-box .fa {
			margin-right: 10px;
		}
	</style>

<body>

<div class="login">
	<div class="container-login100">
		<div class="wrap-login100">
			<div class="login100-pic js-tilt" data-tilt>
				<img src="img/img-01.png" alt="IMG">
			</div>

			<form class="login100-form validate-form">
				<span class="login100-form-title">
					KL工作室人員管理後臺
				</span>

				<div class="wrap-input100 validate-input">
					<input class="input100" type="text" name="username" placeholder="用户名">
					<span class="focus-input100"></span>
					<span class="symbol-input100">
						<i class="fa fa-user" aria-hidden="true"></i>
					</span>
				</div>

				<div class="wrap-input100 validate-input">
					<input class="input100" type="password" name="pass" placeholder="密码">
					<span class="focus-input100"></span>
					<span class="symbol-input100">
						<i class="fa fa-lock" aria-hidden="true"></i>
					</span>
				</div>
				
				<div class="container-login100-form-checkbox">
					<input class="input-checkbox100" id="ckb1" type="checkbox" name="remember-me">
					<label class="label-checkbox100" for="ckb1">
						自动登录
					</label>
				</div>
				
				<div class="container-login100-form-btn">
					<button class="login100-form-btn">
						登陆
					</button>
				</div>

				<div class="text-center p-t-12">
					<a class="txt2" href="javascript:" id="forgotPasswordLink">
						忘记密码？
					</a>
				</div>

				<div class="text-center p-t-136">
					<a class="txt2" href="#">
							还没有账号？立即注册
						<i class="fa fa-long-arrow-right m-l-5" aria-hidden="true"></i>
					</a>
				</div>
			</form>
		</div>
	</div>
</div>

	<!-- 忘记密码弹窗 -->
	<div id="forgotPasswordModal" class="modal">
		<div class="modal-content">
			<span class="close-modal">&times;</span>
			<h2>联系管理员</h2>
			<p>如需重置密码，请通过以下方式联系网站管理员：</p>
			<div class="contact-info">
				<div class="contact-item">
					<i class="fa fa-envelope"></i>
					<span>chcctv2@outlook.com</span>
				</div>
				<div class="contact-item">
					<i class="fa fa-phone"></i>
					<span>18575396741</span>
				</div>
				<div class="contact-item">
					<i class="fa fa-building"></i>
					<span>工作时间：周五至周日 5:00-22:00</span>
				</div>
			</div>
		</div>
	</div>
	
	<!-- 首次登录确认模态框 -->
	<div id="registrationConfirmationModal" class="modal">
		<div class="modal-content">
			<h2>账户注册确认</h2>
			<div class="notice-box">
				<i class="fa fa-info-circle"></i>
				<span>这是您首次登录，请确认是否注册此账户。</span>
			</div>
			<p>账户名称：<strong id="confirmUsername"></strong></p>
			<p>请联系管理员获取当前密码</p>
			<div style="display: flex; justify-content: space-between; margin-top: 30px;">
				<button id="confirmRegistrationBtn" class="btn-primary">确认注册</button>
				<button id="cancelRegistrationBtn" class="btn-secondary" style="width: 48%;">取消</button>
			</div>
		</div>
	</div>
	
	<!-- 密码修改模态框 -->
	<div id="changePasswordModal" class="modal">
		<div class="modal-content">
			<span class="close-modal">&times;</span>
			<h2>修改密码</h2>
			<div id="passwordChangeNotice" class="notice-box">
				<i class="fa fa-exclamation-triangle"></i>
				<span>您的密码已过期，请设置新密码</span>
			</div>
			<form id="changePasswordForm">
				<div class="form-group">
					<label for="currentPassword">当前密码</label>
					<input type="password" id="currentPassword" required>
				</div>
				<div class="form-group">
					<label for="newPassword">新密码</label>
					<input type="password" id="newPassword" required minlength="6">
				</div>
				<div class="form-group">
					<label for="confirmNewPassword">确认新密码</label>
					<input type="password" id="confirmNewPassword" required minlength="6">
				</div>
				<button type="submit" class="btn-primary">确认修改</button>
			</form>
		</div>
	</div>


	<!-- 引入数据库管理器 -->
    <script src="databaseManager.js"></script>
    <script src="userManagement.js"></script>
    <script src="userLoginTracker.js"></script>
    <script src="securityManager.js"></script>
    <script>
		// 使用全局window.userManager
		let currentLoginUser = null;
		
		// 初始化
		window.addEventListener('load', async function() {
			// 等待databaseManager加载完成
			setTimeout(async function() {
				if (window.databaseManager) {
					console.log('数据库管理器已加载');
					// 强制刷新数据库，确保使用最新的用户数据
					if (window.databaseManager.refreshFromJsonFile) {
						console.log('正在刷新数据库，获取最新用户信息...');
						try {
							const success = await window.databaseManager.refreshFromJsonFile();
							if (success) {
								console.log('数据库刷新成功');
							} else {
								console.warn('数据库刷新失败，使用现有数据');
							}
						} catch (error) {
							console.error('数据库刷新出错:', error);
						}
					}
				} else {
					console.error('数据库管理器加载失败');
				}
				
				// 页面加载时检查是否有保存的登录信息
				checkSavedLoginInfo();
				
				// 绑定事件
				bindEvents();
			}, 300);
	});
		
		// 检查保存的登录信息并执行自动登录
		function checkSavedLoginInfo() {
			const rememberLogin = localStorage.getItem('rememberLogin');
			const username = localStorage.getItem('username');
			const hasAutoLoginAttempted = localStorage.getItem('hasAutoLoginAttempted');
			
			if (rememberLogin === 'true' && username) {
				document.querySelector('input[name="username"]').value = username;
				document.querySelector('input[name="remember-me"]').checked = true;
				
				// 检查是否已经尝试过自动登录（防止循环）
				if (!hasAutoLoginAttempted) {
					// 标记已经尝试过自动登录
					localStorage.setItem('hasAutoLoginAttempted', 'true');
					
					// 尝试自动登录（注意：实际密码不应存储在本地）
					// 这里只是为了演示自动登录流程
					tryAutoLogin();
				}
			}
		}
		
		// 尝试自动登录
		function tryAutoLogin() {
			console.log('尝试自动登录...');
			
			// 注意：在实际应用中，密码不应该存储在本地
			// 这里只是为了演示自动登录流程
			const username = localStorage.getItem('username');
			const storedPassword = localStorage.getItem('storedPassword'); // 仅用于演示
			
			// 如果没有存储的密码，不进行自动登录
			if (!storedPassword) {
				console.log('没有存储的密码，跳过自动登录');
				return;
			}
			
			if (!window.databaseManager) {
				console.log('数据库管理器未加载，自动登录失败');
				localStorage.removeItem('hasAutoLoginAttempted');
				return;
			}
			
			try {
				// 验证用户
				const user = window.databaseManager.verifyUser(username, storedPassword);
				
				if (!user) {
					// 密码错误，立即取消自动登录流程
					console.log('自动登录失败：用户名或密码错误');
					// 清除存储的密码以防止重复尝试
					localStorage.removeItem('storedPassword');
					// 清除尝试标记
					localStorage.removeItem('hasAutoLoginAttempted');
					return;
				}
				
				// 登录成功，处理后续逻辑
				currentLoginUser = user;
				localStorage.setItem('currentUser', JSON.stringify(user));
				
				// 检查是否首次登录
				if (user.first === 0) {
					console.log('检测到首次登录，需要强制修改密码');
					// 修改密码修改弹窗提示信息
					document.getElementById('passwordChangeNotice').innerHTML = 
						'<i class="fa fa-info-circle"></i>\n<span>这是您首次登录，请设置新密码</span>';
					document.getElementById('passwordChangeNotice').style.backgroundColor = '#fff3cd';
					document.getElementById('passwordChangeNotice').style.borderColor = '#ffeaa7';
					document.getElementById('passwordChangeNotice').style.color = '#856404';
					
					// 延迟打开密码修改弹窗
					setTimeout(() => {
						openModal('changePasswordModal');
						disablePageInteractions();
					}, 1000);
				} else {
					// 登录成功，跳转到firstPage.html
					const redirectUrl = `firstPage.html?userId=${currentLoginUser.id}`;
					console.log('自动登录成功，正在跳转到验证页面...');
					setTimeout(() => {
						window.location.href = redirectUrl;
					}, 1000);
				}
			} catch (error) {
				console.error('自动登录过程中发生错误:', error);
				// 清除尝试标记
				localStorage.removeItem('hasAutoLoginAttempted');
			}
		}
		
		// 绑定所有事件
		function bindEvents() {
			// 表单提交事件
			document.querySelector('.login100-form').addEventListener('submit', handleLogin);
			
			// 忘记密码相关事件
			bindForgotPasswordEvents();
			
			// 注册确认相关事件
			bindRegistrationConfirmationEvents();
			
			// 密码修改相关事件
			bindPasswordChangeEvents();
		}
		
		// 显示日志弹窗（带动画效果）
		function showLogModal(logs, title = '操作日志') {
			// 检查是否已存在弹窗元素，如果有则移除
			const existingPopup = document.getElementById('log-modal');
			if (existingPopup) {
				existingPopup.remove();
			}
			
			// 创建弹窗容器
			const popupContainer = document.createElement('div');
			popupContainer.id = 'log-modal';
			popupContainer.style.cssText = `
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background-color: rgba(0, 0, 0, 0.5);
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 9999;
				opacity: 0;
				visibility: hidden;
				transition: opacity 0.3s ease, visibility 0.3s ease;
			`;
			
			// 创建弹窗内容
			const popupContent = document.createElement('div');
			popupContent.style.cssText = `
				background-color: white;
				padding: 20px;
				border-radius: 10px;
				width: 90%;
				max-width: 600px;
				max-height: 80vh;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
				transform: scale(0.9);
				transition: transform 0.3s ease;
			`;
			
			// 创建弹窗头部
			const popupHeader = document.createElement('div');
			popupHeader.style.cssText = `
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 15px;
				padding-bottom: 10px;
				border-bottom: 1px solid #eee;
			`;
			
			// 添加标题
			const popupTitle = document.createElement('h3');
			popupTitle.textContent = title;
			popupTitle.style.margin = '0';
			popupTitle.style.color = '#333';
			
			// 添加关闭按钮
			const closeButton = document.createElement('button');
			closeButton.textContent = '×';
			closeButton.style.cssText = `
				background: none;
				border: none;
				font-size: 24px;
				cursor: pointer;
				color: #666;
				width: 30px;
				height: 30px;
				display: flex;
				justify-content: center;
				align-items: center;
				border-radius: 50%;
				transition: background-color 0.2s ease, color 0.2s ease;
			`;
			
			closeButton.addEventListener('mouseover', () => {
				closeButton.style.backgroundColor = '#f0f0f0';
				closeButton.style.color = '#333';
			});
			
			closeButton.addEventListener('mouseout', () => {
				closeButton.style.backgroundColor = 'transparent';
				closeButton.style.color = '#666';
			});
			
			closeButton.addEventListener('click', () => {
				popupContainer.style.opacity = '0';
				popupContainer.style.visibility = 'hidden';
				popupContent.style.transform = 'scale(0.9)';
				setTimeout(() => {
					popupContainer.remove();
				}, 300);
			});
			
			// 创建日志内容区域
			const logContent = document.createElement('div');
			logContent.style.cssText = `
				font-family: monospace;
				max-height: 400px;
				overflow-y: auto;
				padding: 10px;
				background-color: #f9f9f9;
				border-radius: 5px;
				line-height: 1.5;
			`;
			
			// 添加每条日志
			const logsArray = Array.isArray(logs) ? logs : [logs];
			logsArray.forEach(log => {
				const logItem = document.createElement('div');
				logItem.style.marginBottom = '8px';
				
				let color = '#333';
				let bgColor = 'transparent';
				let padding = '5px';
				let message = log;
				let type = 'info';
				
				// 如果日志是对象格式
				if (typeof log === 'object' && log !== null) {
					message = log.message || log;
					type = log.type || 'info';
				}
				
				if (type === 'success') {
					color = '#27ae60';
					bgColor = '#ecf0f1';
				} else if (type === 'error') {
					color = '#e74c3c';
					bgColor = '#ecf0f1';
				}
				
				logItem.style.cssText = `
					color: ${color};
					background-color: ${bgColor};
					padding: ${padding};
					border-radius: 3px;
					border-left: 3px solid ${color};
					animation: fadeIn 0.5s ease;
				`;
				
				logItem.innerHTML = message;
				logContent.appendChild(logItem);
			});
			
			// 组装弹窗
			popupHeader.appendChild(popupTitle);
			popupHeader.appendChild(closeButton);
			popupContent.appendChild(popupHeader);
			popupContent.appendChild(logContent);
			popupContainer.appendChild(popupContent);
			
			// 添加CSS动画
			const style = document.createElement('style');
			style.textContent = `
				@keyframes fadeIn {
					from { opacity: 0; transform: translateX(-10px); }
					to { opacity: 1; transform: translateX(0); }
				}
			`;
			document.head.appendChild(style);
			
			// 添加到文档
			document.body.appendChild(popupContainer);
			
			// 触发动画
			setTimeout(() => {
				popupContainer.style.opacity = '1';
				popupContainer.style.visibility = 'visible';
				popupContent.style.transform = 'scale(1)';
			}, 10);
			
			// 点击弹窗外部关闭
			popupContainer.addEventListener('click', (e) => {
				if (e.target === popupContainer) {
					closeButton.click();
				}
			});
		}

		// 处理登录
	function handleLogin(e) {
		e.preventDefault();
		
		if (!window.databaseManager) {
			showLogModal([{ message: '系统初始化失败，请刷新页面重试', type: 'error' }], '登录错误');
			return;
		}
		
		// 获取表单数据
		const username = document.querySelector('input[name="username"]').value;
		const password = document.querySelector('input[name="pass"]').value;
		const rememberMe = document.querySelector('input[name="remember-me"]').checked;
		
		// 简单的表单验证
		if (!username || !password) {
			showLogModal([{ message: '请填写完整的登录信息', type: 'error' }], '输入验证');
			return;
		}
		
		try {
			// 创建日志
			const logs = [
				{ message: `开始登录验证: ${username}`, type: 'info' }
			];
			
			// 使用databaseManager验证用户
			const user = window.databaseManager.verifyUser(username, password);
			logs.push({ message: `登录验证结果: ${user ? '成功' : '失败'}`, type: user ? 'success' : 'error' });
			
			if (!user) {
				logs.push({ message: '用户名或密码错误', type: 'error' });
				showLogModal(logs, '登录失败');
				return;
			}
			
			currentLoginUser = user;
			logs.push({ message: '用户信息已保存', type: 'success' });
			
			// 存储当前登录用户信息
			localStorage.setItem('currentUser', JSON.stringify(user));
			
			// 处理自动登录
			if (rememberMe) {
				localStorage.setItem('username', username);
				localStorage.setItem('rememberLogin', 'true');
				// 注意：在实际应用中，密码不应该存储在本地
				// 这里只是为了演示自动登录流程
				localStorage.setItem('storedPassword', password);
			} else {
				localStorage.removeItem('username');
				localStorage.removeItem('rememberLogin');
				localStorage.removeItem('storedPassword');
			}
			
			// 清除自动登录尝试标记，确保下次可以再次尝试自动登录
			localStorage.removeItem('hasAutoLoginAttempted');
			
			// 检查是否首次登录 (first字段为0)
						if (user.first === 0) {
							logs.push({ message: '检测到首次登录，需要强制修改密码', type: 'info' });
							showLogModal(logs, '首次登录');
							
							// 修改密码修改弹窗提示信息
							document.getElementById('passwordChangeNotice').innerHTML = 
								'<i class="fa fa-info-circle"></i>\n<span>这是您首次登录，请设置新密码</span>';
							document.getElementById('passwordChangeNotice').style.backgroundColor = '#fff3cd';
							document.getElementById('passwordChangeNotice').style.borderColor = '#ffeaa7';
							document.getElementById('passwordChangeNotice').style.color = '#856404';
							
							// 延迟打开密码修改弹窗
							setTimeout(() => {
								openModal('changePasswordModal');
								// 禁用页面上的其他交互元素，确保用户必须修改密码
								disablePageInteractions();
							}, 1000);
						} else {
				// 登录成功，跳转到firstPage.html并传递用户ID
							const redirectUrl = `firstPage.html?userId=${currentLoginUser.id}`;
							logs.push({ message: '登录成功，正在跳转到验证页面...', type: 'success' });
							showLogModal(logs, '登录成功');
							setTimeout(() => {
								window.location.href = redirectUrl;
							}, 1500); // 延迟跳转，让用户有时间看到成功信息
			}
		} catch (error) {
			console.error('登录失败:', error);
			showLogModal([
				{ message: '登录过程中发生错误', type: 'error' },
				{ message: `错误详情: ${error.message}`, type: 'error' },
				{ message: '请稍后重试', type: 'info' }
			], '登录错误');
		}
	}
		
		// 忘记密码相关事件
		function bindForgotPasswordEvents() {
			const modal = document.getElementById('forgotPasswordModal');
			const forgotPasswordLink = document.getElementById('forgotPasswordLink');
			const closeModal = modal.querySelector('.close-modal');
			
			// 打开弹窗
			forgotPasswordLink.addEventListener('click', function(e) {
				e.preventDefault();
				openModal('forgotPasswordModal');
			});
			
			// 关闭弹窗
			closeModal.addEventListener('click', function() {
				closeModalAnimation(modal);
			});
			
			// 点击弹窗外区域关闭弹窗
			window.addEventListener('click', function(event) {
				if (event.target === modal) {
					closeModalAnimation(modal);
				}
			});
		}
		
		// 注册确认相关事件 - 使用databaseManager
		function bindRegistrationConfirmationEvents() {
			const modal = document.getElementById('registrationConfirmationModal');
			const confirmBtn = document.getElementById('confirmRegistrationBtn');
			const cancelBtn = document.getElementById('cancelRegistrationBtn');
			
			// 确认注册
			confirmBtn.addEventListener('click', function() {
				if (!currentLoginUser) return;
				
				try {
					// 更新用户状态为已确认
					const success = window.databaseManager.updateUser(currentLoginUser.username, { 
						confirmed: true 
					});
					
					if (success) {
						// 显示成功日志
						showLogModal([
							{ message: '注册确认成功', type: 'success' },
							{ message: '即将进入密码设置界面', type: 'info' }
						], '注册成功');
						
						// 关闭确认弹窗，打开密码修改弹窗
						closeModalAnimation(modal);
						
						// 修改提示信息
						document.getElementById('passwordChangeNotice').innerHTML = 
							'<i class="fa fa-check-circle"></i>\n<span>注册成功，请设置您的初始密码</span>';
						document.getElementById('passwordChangeNotice').style.backgroundColor = '#d4edda';
						document.getElementById('passwordChangeNotice').style.borderColor = '#c3e6cb';
						document.getElementById('passwordChangeNotice').style.color = '#155724';
						
						// 延迟打开密码修改弹窗
						setTimeout(() => {
							openModal('changePasswordModal');
						}, 300);
					}
				} catch (error) {
					console.error('确认注册失败:', error);
					showLogModal([
						{ message: '确认注册失败', type: 'error' },
						{ message: `错误详情: ${error.message}`, type: 'error' },
						{ message: '请稍后重试', type: 'info' }
					], '操作错误');
				}
			});
			
			// 取消注册
			cancelBtn.addEventListener('click', function() {
				closeModalAnimation(modal);
				currentLoginUser = null;
			});
		}
		
		// 密码修改相关事件 - 使用databaseManager
		function bindPasswordChangeEvents() {
			const modal = document.getElementById('changePasswordModal');
			const closeModal = modal.querySelector('.close-modal');
			const form = document.getElementById('changePasswordForm');
			
			// 关闭弹窗
			closeModal.addEventListener('click', function() {
				closeModalAnimation(modal);
			});
			
			// 点击弹窗外区域关闭弹窗
			window.addEventListener('click', function(event) {
				if (event.target === modal) {
					closeModalAnimation(modal);
				}
			});
			
			// 表单提交
			form.addEventListener('submit', function(e) {
				e.preventDefault();
				
				if (!currentLoginUser) {
					alert('请先登录');
					return;
				}
				
				const currentPassword = document.getElementById('currentPassword').value;
				const newPassword = document.getElementById('newPassword').value;
				const confirmNewPassword = document.getElementById('confirmNewPassword').value;
				
				// 创建日志
				const logs = [
					{ message: '开始密码修改流程', type: 'info' }
				];
				
				// 验证密码
				if (newPassword !== confirmNewPassword) {
					logs.push({ message: '两次输入的新密码不一致', type: 'error' });
					showLogModal(logs, '密码验证失败');
					return;
				}
				
				if (newPassword.length < 6) {
					logs.push({ message: '新密码长度至少为6位', type: 'error' });
					showLogModal(logs, '密码验证失败');
					return;
				}
				
				// 验证当前密码
				if (currentPassword !== currentLoginUser.password) {
					logs.push({ message: '当前密码错误', type: 'error' });
					showLogModal(logs, '密码验证失败');
					return;
				}
				
				logs.push({ message: '密码验证通过，开始更新', type: 'success' });
				
				try {
					// 使用databaseManager更新密码和first字段
						// 准备更新的用户信息
					const userUpdates = { 
						password: newPassword,
						lastPasswordChange: Date.now()
					};
						
					// 如果是首次登录，将first字段更新为1
					if (currentLoginUser && currentLoginUser.first === 0) {
						userUpdates.first = 1;
						logs.push({ message: '首次登录密码设置完成，更新登录状态为已激活', type: 'info' });
						// 启用页面交互，因为密码修改完成
						enablePageInteractions();
					}
							
						// 使用databaseManager更新用户信息
						const success = window.databaseManager.updateUser(currentLoginUser.username, userUpdates);
						logs.push({ message: `更新结果: ${success ? '成功' : '失败'}`, type: success ? 'success' : 'error' });
							
						if (success) {
							// 更新当前登录用户信息
						Object.assign(currentLoginUser, userUpdates);
						localStorage.setItem('currentUser', JSON.stringify(currentLoginUser));
						
						// 首次登录设置完成，跳转到firstPage.html并传递用户ID
													const redirectUrl = `firstPage.html?userId=${currentLoginUser.id}`;
													logs.push({ message: '首次登录设置完成，正在跳转到验证页面...', type: 'success' });
							
							showLogModal(logs, '密码修改成功');
							closeModalAnimation(modal);
							// 延迟跳转，确保首次登录用户正确跳转
							setTimeout(() => {
								window.location.href = redirectUrl;
							}, 1500);
						} else {
							logs.push({ message: '密码修改失败', type: 'error' });
							showLogModal(logs, '密码修改失败');
						}
				} catch (error) {
					console.error('修改密码失败:', error);
					logs.push({ message: `更新过程中发生错误: ${error.message}`, type: 'error' });
					logs.push({ message: '请稍后重试', type: 'info' });
					showLogModal(logs, '操作错误');
				}
			});
		}
		
		// 打开模态框
		function openModal(modalId) {
			const modal = document.getElementById(modalId);
			const modalContent = modal.querySelector('.modal-content');
			
			modal.style.display = 'flex';
			
			// 重置动画状态
			modalContent.style.opacity = '0';
			modalContent.style.transform = 'translate(-50%, -50%) scale(0.8)';
			
			// 触发动画
			setTimeout(() => {
				modalContent.style.opacity = '1';
				modalContent.style.transform = 'translate(-50%, -50%) scale(1)';
			}, 10);
		}
		
		// 禁用页面交互元素，确保用户必须修改密码
		function disablePageInteractions() {
			const modal = document.getElementById('changePasswordModal');
			// 为模态框添加阻止关闭的属性
			modal.dataset.backdrop = 'static';
			modal.dataset.keyboard = 'false';
			
			// 禁用关闭按钮
			const closeButton = modal.querySelector('.close-modal');
			if (closeButton) {
				closeButton.style.pointerEvents = 'none';
				closeButton.style.opacity = '0.5';
			}
			
			// 添加点击外部不关闭的处理
			modal.onclick = function(event) {
				if (event.target === modal) {
					return false;
				}
			};
		}
		
		// 启用页面交互元素
		function enablePageInteractions() {
			const modal = document.getElementById('changePasswordModal');
			// 移除阻止关闭的属性
			delete modal.dataset.backdrop;
			delete modal.dataset.keyboard;
			
			// 启用关闭按钮
			const closeButton = modal.querySelector('.close-modal');
			if (closeButton) {
				closeButton.style.pointerEvents = 'auto';
				closeButton.style.opacity = '1';
			}
			
			// 恢复默认的点击行为
			modal.onclick = null;
		}
		
		// 关闭模态框动画
		function closeModalAnimation(modal) {
			const modalContent = modal.querySelector('.modal-content');
			
			modalContent.style.opacity = '0';
			modalContent.style.transform = 'translate(-50%, -50%) scale(0.8)';
			
			setTimeout(() => {
				modal.style.display = 'none';
			}, 300);
		}
	</script>
