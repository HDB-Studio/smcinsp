<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<title>KL工作室人員管理後臺 - 登录验证</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!--图标-->
	<link rel="stylesheet" type="text/css" href="css/font-awesome.min.css">
	<!--布局框架-->
	<link rel="stylesheet" type="text/css" href="css/util.css">
	<!--主要样式-->
	<link rel="stylesheet" type="text/css" href="css/main.css">
	<style>
		/* 模态框通用样式 */
		.modal {
			display: none;
			position: fixed;
			z-index: 9999;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			overflow: auto;
			background-color: rgb(0,0,0);
			background-color: rgba(0,0,0,0.5);
			justify-content: center;
			align-items: center;
			transition: opacity 0.3s ease;
		}

		.modal-content {
			background-color: #fefefe;
			margin: auto;
			padding: 40px;
			border-radius: 15px;
			width: 80%;
			max-width: 500px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.3);
			transition: all 0.3s ease;
			opacity: 1;
			transform: translate(-50%, -50%) scale(1);
			position: absolute;
			left: 50%;
			top: 50%;
		}

		.close-modal {
			color: #aaa;
			float: right;
			font-size: 28px;
			font-weight: bold;
			cursor: pointer;
			transition: color 0.3s ease;
		}

		.close-modal:hover,
		.close-modal:focus {
			color: #333;
			text-decoration: none;
		}

		/* 表单样式 */
		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			font-weight: 500;
			color: #333;
		}

		.form-group input {
			width: 100%;
			padding: 12px;
			border: 1px solid #ddd;
			border-radius: 8px;
			font-size: 16px;
			transition: border-color 0.3s ease;
		}

		.form-group input:focus {
			outline: none;
			border-color: #3498db;
		}

		.btn-primary {
			background-color: #3498db;
			color: white;
			border: none;
			padding: 12px 30px;
			border-radius: 8px;
			font-size: 16px;
			cursor: pointer;
			transition: background-color 0.3s ease;
			width: 100%;
			margin-top: 10px;
		}

		.btn-primary:hover {
			background-color: #2980b9;
		}

		/* 通知样式 */
		.notice-box {
			background-color: #fff3cd;
			border: 1px solid #ffeaa7;
			color: #856404;
			padding: 15px;
			border-radius: 8px;
			margin-bottom: 20px;
		}

		.notice-box .fa {
			margin-right: 10px;
		}

		/* 日志显示样式 */
		.log-container {
			font-family: monospace;
			max-height: 400px;
			overflow-y: auto;
			padding: 20px;
			background-color: #f9f9f9;
			border-radius: 10px;
			line-height: 1.6;
		}

		.log-item {
			margin-bottom: 10px;
			padding: 8px;
			border-radius: 5px;
			border-left: 4px solid #3498db;
		}

		.log-item.success {
			border-left-color: #27ae60;
			background-color: #ecf0f1;
		}

		.log-item.error {
			border-left-color: #e74c3c;
			background-color: #ecf0f1;
		}

		.log-item.info {
			border-left-color: #3498db;
			background-color: #ecf0f1;
		}
	</style>
</head>
<body>
	<div class="login">
		<div class="container-login100">
			<div class="wrap-login100">
				<div id="logContainer" class="log-container">
					<div class="log-item info">正在验证用户信息...</div>
				</div>
			</div>
		</div>
	</div>

	<!-- 密码修改模态框 -->
	<div id="changePasswordModal" class="modal">
		<div class="modal-content">
			<span class="close-modal">&times;</span>
			<h2>首次登录 - 设置新密码</h2>
			<div id="passwordChangeNotice" class="notice-box">
				<i class="fa fa-info-circle"></i>
				<span>这是您首次登录，请设置新密码</span>
			</div>
			<form id="changePasswordForm">
				<div class="form-group">
					<label for="currentPassword">当前密码</label>
					<input type="password" id="currentPassword" required>
				</div>
				<div class="form-group">
					<label for="newPassword">新密码</label>
					<input type="password" id="newPassword" required minlength="6">
				</div>
				<div class="form-group">
					<label for="confirmNewPassword">确认新密码</label>
					<input type="password" id="confirmNewPassword" required minlength="6">
				</div>
				<button type="submit" class="btn-primary">确认修改</button>
			</form>
		</div>
	</div>

	<!-- 引入数据库管理器 -->
	<script src="databaseManager.js"></script>
	<script src="securityManager.js"></script>
	<script>
		// 日志数组，用于记录操作过程
		let logs = [];
		let currentUserId = null;
		let currentUser = null;

		// 初始化
		window.addEventListener('load', function() {
			// 获取URL参数中的用户ID
			const urlParams = new URLSearchParams(window.location.search);
			currentUserId = urlParams.get('userId');

			log('开始验证登录信息');

			if (!currentUserId) {
				log('未找到用户ID参数，重定向到登录页面', 'error');
				setTimeout(() => {
					window.location.href = 'index.html';
				}, 2000);
				return;
			}

			log(`接收到用户ID: ${currentUserId}`);

			// 等待数据库管理器加载
			setTimeout(() => {
				if (!window.databaseManager) {
					log('数据库管理器加载失败', 'error');
					return;
				}

				// 从数据库中查询用户信息
				getUserInfo();
			}, 300);
		});

		// 获取用户信息
		function getUserInfo() {
			try {
				log('正在从数据库查询用户信息');
				currentUser = window.databaseManager.findUserById(currentUserId);

				if (!currentUser) {
					log('用户不存在', 'error');
					setTimeout(() => {
						window.location.href = 'index.html';
					}, 2000);
					return;
				}

				log(`用户信息查询成功: ${currentUser.username || currentUser.email}`);
				
				// 确保password和first字段存在并具有有效值
				if (currentUser.password === undefined) {
					log('用户缺少密码字段，设置默认密码', 'warning');
					currentUser.password = 'initial123'; // 设置默认密码
				}
				
				// 确保first字段存在，默认为0
				if (currentUser.first === undefined) {
					log('用户缺少first字段，设置默认值为0', 'warning');
					currentUser.first = 0;
					// 更新到数据库
					window.databaseManager.updateUser(currentUser.username || currentUser.email, { first: 0 });
				}

				log(`用户password字段: [已存在]`);
				log(`用户first字段值: ${currentUser.first}`);

				// 检查first字段
				checkFirstLogin();
			} catch (error) {
				log(`查询用户信息失败: ${error.message}`, 'error');
				// 尝试备用方法获取用户信息
				tryBackupUserInfo();
			}
		}
		
		// 备用方法获取用户信息
		function tryBackupUserInfo() {
			try {
				log('尝试从localStorage获取用户信息');
				const storedUser = localStorage.getItem('currentUser');
				if (storedUser) {
					currentUser = JSON.parse(storedUser);
					log(`从localStorage恢复用户信息: ${currentUser.username || currentUser.email}`, 'info');
					
					// 确保first字段存在
					if (currentUser.first === undefined) {
						log('设置first字段默认值为0', 'warning');
						currentUser.first = 0;
					}
					
					// 检查first字段
					checkFirstLogin();
				} else {
					log('无法获取用户信息，重定向到登录页面', 'error');
					setTimeout(() => {
						window.location.href = 'index.html';
					}, 2000);
				}
			} catch (error) {
				log(`备用方法获取用户信息失败: ${error.message}`, 'error');
				setTimeout(() => {
					window.location.href = 'index.html';
				}, 2000);
			}
		}

		// 检查是否首次登录
		function checkFirstLogin() {
			log(`检查用户first字段值: ${currentUser.first}`);

			// 确保first字段是数字类型
			const firstValue = parseInt(currentUser.first) || 0;
			currentUser.first = firstValue;

			if (firstValue === 0) {
				// 首次登录，显示密码修改弹窗
				log('检测到首次登录，需要强制修改密码');
				
				// 预填充当前密码
				const currentPasswordInput = document.getElementById('currentPassword');
				if (currentPasswordInput && currentUser.password) {
					currentPasswordInput.value = currentUser.password;
				}
				
				setTimeout(() => {
					openModal('changePasswordModal');
					disablePageInteractions();
				}, 1000);
			} else {
				// 非首次登录，直接跳转到第二页面
				log('用户已完成首次登录设置，跳转到第二页面');
				setTimeout(() => {
					redirectToSecondPage();
				}, 1500);
			}
		}

		// 重定向到第二页面
		function redirectToSecondPage() {
			let redirectUrl = 'secondPage.html';
			redirectUrl += `?userId=${currentUserId}`;
			log(`正在跳转到第二页面: ${redirectUrl}`);
			window.location.href = redirectUrl;
		}

		// 记录日志
		function log(message, type = 'info') {
			const timestamp = new Date().toLocaleString('zh-CN');
			const logItem = {
				timestamp,
				message,
				type
			};
			logs.push(logItem);

			// 更新UI显示
			const logContainer = document.getElementById('logContainer');
			const logEl = document.createElement('div');
			logEl.className = `log-item ${type}`;
			logEl.innerHTML = `[${timestamp}] ${message}`;
			logContainer.appendChild(logEl);
			logContainer.scrollTop = logContainer.scrollHeight;

			// 同时记录到控制台
			console.log(`[${type.toUpperCase()}] ${message}`);
		}

		// 打开模态框
		function openModal(modalId) {
			const modal = document.getElementById(modalId);
			const modalContent = modal.querySelector('.modal-content');

			modal.style.display = 'flex';

			// 重置动画状态
			modalContent.style.opacity = '0';
			modalContent.style.transform = 'translate(-50%, -50%) scale(0.8)';

			// 触发动画
			setTimeout(() => {
				modalContent.style.opacity = '1';
				modalContent.style.transform = 'translate(-50%, -50%) scale(1)';
			}, 10);
		}

		// 禁用页面交互元素
		function disablePageInteractions() {
			const modal = document.getElementById('changePasswordModal');
			// 为模态框添加阻止关闭的属性
			modal.dataset.backdrop = 'static';
			modal.dataset.keyboard = 'false';

			// 禁用关闭按钮
			const closeButton = modal.querySelector('.close-modal');
			if (closeButton) {
				closeButton.style.pointerEvents = 'none';
				closeButton.style.opacity = '0.5';
			}

			// 添加点击外部不关闭的处理
			modal.onclick = function(event) {
				if (event.target === modal) {
					return false;
				}
			};
		}

		// 密码修改表单提交处理
		document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
			e.preventDefault();

			const currentPassword = document.getElementById('currentPassword').value;
			const newPassword = document.getElementById('newPassword').value;
			const confirmNewPassword = document.getElementById('confirmNewPassword').value;

			log('开始密码修改流程');

			// 验证密码
			if (newPassword !== confirmNewPassword) {
				log('两次输入的新密码不一致', 'error');
				alert('两次输入的新密码不一致');
				return;
			}

			if (newPassword.length < 6) {
				log('新密码长度至少为6位', 'error');
				alert('新密码长度至少为6位');
				return;
			}

			// 验证当前密码
			if (currentPassword !== currentUser.password) {
				log('当前密码错误', 'error');
				alert('当前密码错误');
				return;
			}

			log('密码验证通过，开始更新');

			try {
				// 准备更新的用户信息
				const userUpdates = {
					password: newPassword,
					first: 1,
					lastPasswordChange: Date.now(),
					confirmed: true
				};

				// 使用ID或用户名更新用户信息
				const updateIdentifier = currentUser.username || currentUser.email || currentUser.id;
				log(`使用标识符 ${updateIdentifier} 更新用户信息`);
				
				// 更新用户信息
				const success = window.databaseManager.updateUser(updateIdentifier, userUpdates);

				if (success) {
					log('密码修改成功，first字段已更新为1', 'success');
					// 更新当前用户信息
					Object.assign(currentUser, userUpdates);
					localStorage.setItem('currentUser', JSON.stringify(currentUser));

					// 记录登录状态
					if (window.userLoginTracker) {
						window.userLoginTracker.trackUserLogin(currentUser.username || currentUser.email);
						log('已通过userLoginTracker记录登录状态', 'success');
					}

					// 跳转到第二页面
					log('首次登录设置完成，跳转到第二页面', 'success');
					const modal = document.getElementById('changePasswordModal');
					modal.style.display = 'none';
					setTimeout(() => {
						redirectToSecondPage();
					}, 1000);
				} else {
					log('密码修改失败', 'error');
					// 尝试直接更新localStorage作为备用
					try {
						Object.assign(currentUser, userUpdates);
						localStorage.setItem('currentUser', JSON.stringify(currentUser));
						log('已在localStorage中更新用户信息', 'info');
						alert('密码修改在本地记录成功，将继续流程');
						// 继续跳转流程
						const modal = document.getElementById('changePasswordModal');
						modal.style.display = 'none';
						setTimeout(() => {
							redirectToSecondPage();
						}, 1000);
					} catch (backupError) {
						log(`备用更新方法失败: ${backupError.message}`, 'error');
						alert('密码修改失败，请重试');
					}
				}
			} catch (error) {
				log(`修改密码过程中发生错误: ${error.message}`, 'error');
				alert('修改密码失败，请重试');
			}
		});
	</script>
</body>
</html>
